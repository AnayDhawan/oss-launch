name: Bug report
description: A template, script, or reference in oss-launch is wrong or broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SKILL.md workflow
        - scripts/ (audit, release, labels, media)
        - templates/ (generated file is wrong)
        - references/ (doc is wrong or outdated)
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What is wrong?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran /oss-launch on ...
        2. ...
    validations:
      required: false
