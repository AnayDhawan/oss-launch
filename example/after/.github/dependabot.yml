version: 2
updates:
  # Replace package-ecosystem with your stack: npm | pip | cargo | gomod | composer | nuget
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
